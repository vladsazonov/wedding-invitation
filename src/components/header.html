<section class="header" id="header">
  <div class="header__bg">
    <img
      src="./src/images/header/hero-bg.webp"
      alt="Владислав и Надежда"
      class="header__photo"
      loading="eager"
      fetchpriority="high"
    />
    <div class="header__overlay"></div>
    <div class="header__dimmer"></div>
  </div>

  <div class="header__content">
    <div class="header__meta" data-aos="fade-down" data-aos-delay="50" data-aos-duration="600">
      <p class="header__badge">Приглашение на свадьбу</p>
    </div>

    <div class="header__main">
      <div
        class="header__amp"
        data-aos="zoom-in"
        data-aos-delay="100"
        data-aos-duration="600"
        aria-hidden="true"
      >
        &amp;
      </div>
      <h1
        class="header__names"
        data-aos="fade-up"
        data-aos-delay="150"
        data-aos-duration="600"
        aria-label="Свадьба Владислава и Надежды"
      >
        <span class="header__name">Владислав</span>
        <span class="header__name">Надежда</span>
      </h1>
    </div>

    <time
      class="header__date"
      datetime="2026-08-17"
      aria-label="17 августа 2026 года"
      data-aos="fade-up"
      data-aos-delay="250"
      data-aos-duration="600"
    >
      <span class="header__date-segment">
        <span class="header__date-num">17</span>
      </span>
      <span class="header__date-segment">
        <span class="header__date-num">08</span>
      </span>
      <span class="header__date-segment">
        <span class="header__date-num">26</span>
      </span>
    </time>
  </div>
</section>
