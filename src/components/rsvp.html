<section class="rsvp" data-aos="fade-up">
  <div class="rsvp__container">
    <h2 class="rsvp__title">Я точно буду!</h2>
    <p class="rsvp__subtitle">Пожалуйста, подтвердите ваше присутствие, чтобы мы могли учесть вас при планировании.</p>
    
    <form class="rsvp__form form" id="rsvp-form">
      <div class="form__group">
        <label for="form-name" class="form__label">Ваше имя / имена</label>
        <input type="text" id="form-name" class="form__input" required placeholder="Иван и Елена">
      </div>
      
      <div class="form__group">
        <label class="form__label">Сможете ли вы присутствовать?</label>
        <div class="form__radio-group">
          <label class="form__radio-label">
            <input type="radio" name="attendance" value="yes" class="form__radio" checked>
            <span>Я/Мы придем</span>
          </label>
          <label class="form__radio-label">
            <input type="radio" name="attendance" value="no" class="form__radio">
            <span>Не смогу / Не сможем</span>
          </label>
        </div>
      </div>

      <button type="submit" class="button form__submit" id="submit-btn">
        <span class="button__text">Подтвердить присутствие</span>
        <span class="button__loader" style="display: none;">Отправка...</span>
      </button>
    </form>

    <div class="rsvp__success rsvp__success--hidden" id="success-block">
      <h3 class="rsvp__success-title">Спасибо!</h3>
      <p class="rsvp__success-text">Ваш ответ успешно сохранен.</p>
    </div>
  </div>
</section>
