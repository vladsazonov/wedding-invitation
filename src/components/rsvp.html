<section class="rsvp" id="rsvp">
  <div class="rsvp__container" data-aos="fade-up" data-aos-duration="800">
    <h2 class="rsvp__title">Подтверждение присутствия</h2>

    <form class="rsvp__form" id="wedding-form">
      <input type="hidden" name="guestId" class="rsvp__hidden-id" value="" />
      <input type="hidden" name="rawGuests" class="rsvp__hidden-raw-guests" value="" />

      <div class="rsvp__intro">
        <span class="rsvp__intro-title" id="rsvp-intro-title">Наши дорогие гости</span>
        <span class="rsvp__highlight-name" id="rsvp-guest-names"></span>
        <p class="rsvp__intro-desc">Будем рады встрече!</p>
        <span class="rsvp__deadline">
          Просьба ответить до
          <span class="rsvp__highlight-date">17.07.2026</span>
        </span>
      </div>

      <fieldset class="rsvp__fieldset">
        <legend class="rsvp__legend rsvp__legend--hidden">Ваше присутствие</legend>
        <div class="rsvp__options rsvp__options--3col">
          <label class="rsvp__choice">
            <input
              type="radio"
              name="attendance"
              value="Приду"
              class="rsvp__input-hidden"
              required
            />
            <div class="rsvp__choice-block" id="label-attend-yes">Я приду</div>
          </label>
          <label class="rsvp__choice">
            <input type="radio" name="attendance" value="Не приду" class="rsvp__input-hidden" />
            <div class="rsvp__choice-block" id="label-attend-no">Не смогу</div>
          </label>
          <label class="rsvp__choice">
            <input type="radio" name="attendance" value="Сообщу позже" class="rsvp__input-hidden" />
            <div class="rsvp__choice-block" id="label-attend-maybe">Сообщу позже</div>
          </label>
        </div>
      </fieldset>

      <fieldset class="rsvp__fieldset">
        <legend class="rsvp__legend">Ваши предпочтения в напитках:</legend>
        <div class="rsvp__options rsvp__options--2col">
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input type="checkbox" value="Виски" class="rsvp__input-hidden rsvp-alcohol-item" />
            <div class="rsvp__choice-block">Виски</div>
          </label>
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input type="checkbox" value="Водка" class="rsvp__input-hidden rsvp-alcohol-item" />
            <div class="rsvp__choice-block">Водка</div>
          </label>
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input
              type="checkbox"
              value="Шампанское"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Шампанское</div>
          </label>
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input
              type="checkbox"
              value="Белое вино"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Белое вино</div>
          </label>
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input
              type="checkbox"
              value="Красное вино"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Красное вино</div>
          </label>
          <label class="rsvp__choice rsvp__choice--alcohol">
            <input
              type="checkbox"
              value="Не пью алкоголь"
              class="rsvp__input-hidden rsvp-alcohol-item"
              id="alcohol-absent"
            />
            <div class="rsvp__choice-block">Не пью алкоголь</div>
          </label>
        </div>
      </fieldset>

      <div class="rsvp__field">
        <label for="rsvp-wishes" class="rsvp__label">Пожелания к празднику (необязательно)</label>
        <textarea
          name="wishes"
          id="rsvp-wishes"
          class="rsvp__textarea"
          placeholder="Например: Аллергии, предпочтения в еде, музыкальные пожелания и т.д."
        ></textarea>
      </div>

      <button type="submit" class="rsvp__submit" id="submit-btn">Отправить ответ</button>
    </form>

    <div class="rsvp__success-wrapper rsvp__success--hidden" id="success-message">
      <div class="rsvp__success">
        <svg class="rsvp__success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <h3 class="rsvp__success-title">Ответ отправлен</h3>

        <div class="rsvp__photo-wrapper" id="success-photo-wrapper">
          <img
            src="./src/images/rsvp/final.webp"
            alt="Владислав и Надежда"
            class="rsvp__photo"
            loading="lazy"
          />
        </div>

        <div class="rsvp__success-message-block" id="success-text">
          <span class="rsvp__success-meet">До скорой встречи!</span>
          <span class="rsvp__success-signature">С любовью, Владислав и Надежда</span>
        </div>

        <button type="button" class="rsvp__edit-btn" id="edit-btn">Редактировать ответ</button>
      </div>
    </div>
  </div>
</section>
