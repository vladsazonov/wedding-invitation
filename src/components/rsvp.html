<section class="rsvp" id="rsvp">
  <div class="rsvp__container" data-aos="fade-up" data-aos-duration="800">
    <div class="rsvp__header">
      <h2 class="rsvp__title">Подтверждение присутствия</h2>
      <div class="rsvp__personalization">
        <p class="rsvp__welcome-text">Приглашение для:</p>
        <p class="rsvp__guest-name" id="guest-rendering-target">Дорогой гость</p>
      </div>
      <div class="rsvp__divider" aria-hidden="true"></div>
    </div>

    <form class="rsvp__form" id="wedding-form">
      <input type="hidden" name="entry.1000001" id="google-entry-id" value="" />
      <input type="hidden" name="entry.1000002" id="google-entry-raw-guests" value="" />

      <fieldset class="rsvp__fieldset">
        <legend class="rsvp__legend">
          Будем рады видеть вас! Пожалуйста, подтвердите ваше присутствие до 17.07.2026:
        </legend>
        <div class="rsvp__options-grid">
          <label class="rsvp__choice">
            <input
              type="radio"
              name="entry.2000001"
              value="Приду"
              class="rsvp__input-hidden"
              required
            />
            <div class="rsvp__choice-block">Я приду</div>
          </label>
          <label class="rsvp__choice">
            <input type="radio" name="entry.2000001" value="Не приду" class="rsvp__input-hidden" />
            <div class="rsvp__choice-block">Не смогу</div>
          </label>
          <label class="rsvp__choice">
            <input
              type="radio"
              name="entry.2000001"
              value="Сообщу позже"
              class="rsvp__input-hidden"
            />
            <div class="rsvp__choice-block">Позже</div>
          </label>
        </div>
      </fieldset>

      <fieldset class="rsvp__fieldset">
        <legend class="rsvp__legend">Ваши предпочтения в напитках:</legend>
        <div class="rsvp__options-flex">
          <label class="rsvp__choice">
            <input type="checkbox" value="Виски" class="rsvp__input-hidden rsvp-alcohol-item" />
            <div class="rsvp__choice-block">Виски</div>
          </label>
          <label class="rsvp__choice">
            <input type="checkbox" value="Водка" class="rsvp__input-hidden rsvp-alcohol-item" />
            <div class="rsvp__choice-block">Водка</div>
          </label>
          <label class="rsvp__choice">
            <input
              type="checkbox"
              value="Шампанское"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Шампанское</div>
          </label>
          <label class="rsvp__choice">
            <input
              type="checkbox"
              value="Белое вино"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Белое вино</div>
          </label>
          <label class="rsvp__choice">
            <input
              type="checkbox"
              value="Красное вино"
              class="rsvp__input-hidden rsvp-alcohol-item"
            />
            <div class="rsvp__choice-block">Красное вино</div>
          </label>
          <label class="rsvp__choice rsvp__choice--fullwidth">
            <input
              type="checkbox"
              value="Не пью алкоголь"
              class="rsvp__input-hidden rsvp-alcohol-item"
              id="alcohol-absent"
            />
            <div class="rsvp__choice-block">Не пью алкоголь</div>
          </label>
        </div>
      </fieldset>

      <div class="rsvp__field">
        <label for="rsvp-wishes" class="rsvp__label">Пожелания к празднику (необязательно)</label>
        <textarea
          name="entry.3000001"
          id="rsvp-wishes"
          class="rsvp__textarea"
          placeholder="Ваши пожелания..."
        ></textarea>
      </div>

      <button type="submit" class="rsvp__submit" id="submit-btn">Отправить ответ</button>
    </form>

    <div class="rsvp__success rsvp__success--hidden" id="success-message">
      <div class="rsvp__success-icon" aria-hidden="true">✓</div>
      <h3 class="rsvp__success-title">Ответ отправлен</h3>
      <p class="rsvp__success-text">Спасибо! До встречи на торжестве.</p>
    </div>
  </div>
</section>
