<section class="location" id="location-component">
  <div class="location__container">
    <div class="location__frame" data-aos="fade-up" data-aos-duration="800">
      <h2 class="location__title">Место проведения</h2>
      <div class="location__divider"></div>

      <p class="location__name">«Орлиные скалы»</p>
      <p class="location__address">
        ул.Орлиные скалы 4, Лермонтов
        <br />
      </p>

      <div class="location__preview">
        <div class="location__image-wrapper">
          <img
            src="./src/images/location/venue-preview.webp"
            alt="Место проведения"
            class="location__photo"
            loading="lazy"
          />
          <div class="location__photo-placeholder"></div>
        </div>
        <div class="location__preview-overlay"></div>
      </div>

      <button type="button" class="location__button" id="openMapAction">Посмотреть на карте</button>
    </div>
  </div>
</section>
