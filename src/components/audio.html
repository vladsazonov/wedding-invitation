<div class="audio-control">
  <button
    class="audio-control__button"
    aria-label="Включить или выключить музыкальное сопровождение"
    aria-pressed="false"
    data-audio-action="toggle"
  >
    <img
      class="audio-control__icon audio-control__icon--play"
      src="./src/assets/icons/play.svg"
      width="24"
      height="24"
      alt=""
      aria-hidden="true"
    />
    <img
      class="audio-control__icon audio-control__icon--pause"
      src="./src/assets/icons/pause.svg"
      width="24"
      height="24"
      alt=""
      aria-hidden="true"
    />
  </button>
  <audio
    class="audio-control__player"
    src="./src/assets/audio/wedding-ambient.mp3"
    preload="metadata"
    loop
    muted
    data-audio-element="track"
  ></audio>
</div>
