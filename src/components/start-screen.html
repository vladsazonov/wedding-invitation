<div
  class="intro-overlay"
  id="start-screen-component"
  role="dialog"
  aria-modal="true"
  aria-label="Стартовый экран"
>
  <!-- SVG Clip Paths for Rounded Envelope Flaps -->
  <svg class="intro-overlay__svg-clip" aria-hidden="true">
    <defs>
      <clipPath id="flap-top-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0,0 L 1,0 L 0.54,0.51 Q 0.50,0.56 0.46,0.51 Z" />
      </clipPath>
      <clipPath id="flap-bottom-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0,1 L 1,1 L 0.54,0.49 Q 0.50,0.44 0.46,0.49 Z" />
      </clipPath>
      <clipPath id="flap-left-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0,0 L 0,1 L 0.48,0.54 Q 0.53,0.50 0.48,0.46 Z" />
      </clipPath>
      <clipPath id="flap-right-clip" clipPathUnits="objectBoundingBox">
        <path d="M 1,0 L 1,1 L 0.52,0.54 Q 0.47,0.50 0.52,0.46 Z" />
      </clipPath>
    </defs>
  </svg>

  <div class="intro-envelope">
    <div class="intro-envelope__back"></div>

    <div class="intro-envelope__flap intro-envelope__flap--left"></div>
    <div class="intro-envelope__flap intro-envelope__flap--right"></div>
    <div class="intro-envelope__flap intro-envelope__flap--bottom">
      <span class="intro-envelope__bottom-text">Владислав &amp; Надежда</span>
    </div>
    <div class="intro-envelope__flap intro-envelope__flap--top"></div>

    <div class="intro-envelope__cta">
      <button type="button" class="intro-envelope__seal-ring" aria-label="Открыть приглашение">
        <svg
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
          width="24"
          height="24"
        >
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          />
        </svg>
      </button>
      <p class="intro-envelope__text">Приглашение на свадьбу</p>
    </div>
  </div>
</div>
