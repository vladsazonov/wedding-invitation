<section class="calendar" id="calendar-component">
  <div class="calendar__date-box" data-aos="fade-up">
    <div class="calendar__date-border">
      <span class="calendar__date-header">ждём вас в наш день</span>
      <time class="calendar__date" datetime="2026-08-17">17.08.2026</time>
    </div>
  </div>

  <div class="calendar__container" data-aos="fade-up" aria-labelledby="calendar-month-title">
    <header class="calendar__header">
      <h3 class="calendar__month" id="calendar-month-title"></h3>
    </header>

    <div class="calendar__weekdays">
      <span aria-label="Понедельник">Пн</span>
      <span aria-label="Вторник">Вт</span>
      <span aria-label="Среда">Ср</span>
      <span aria-label="Четверг">Чт</span>
      <span aria-label="Пятница">Пт</span>
      <span class="calendar__day--weekend" aria-label="Суббота">Сб</span>
      <span class="calendar__day--weekend" aria-label="Воскресенье">Вс</span>
    </div>

    <div class="calendar__days" id="calendar-days-grid"></div>
  </div>
</section>
