<section class="timing" id="timing" aria-label="Программа дня">
  <div class="timing__inner">
    <h2 class="timing__title" data-aos="fade-up">ТАЙМИНГ ДНЯ</h2>

    <div class="timing__list">
      <div class="timing__row" data-aos="fade-up">
        <div class="timing__col timing__col--caption">
          <span class="timing__caption">Сбор гостей</span>
        </div>
        <div class="timing__col timing__col--time">
          <span class="timing__time">15:30</span>
        </div>
      </div>

      <div class="timing__row timing__row--reverse" data-aos="fade-up">
        <div class="timing__col timing__col--caption">
          <span class="timing__caption">Начало церемонии</span>
        </div>
        <div class="timing__col timing__col--time">
          <span class="timing__time">16:00</span>
        </div>
      </div>

      <div class="timing__row" data-aos="fade-up">
        <div class="timing__col timing__col--caption">
          <span class="timing__caption">Начало банкета</span>
        </div>
        <div class="timing__col timing__col--time">
          <span class="timing__time">17:15</span>
        </div>
      </div>

      <div class="timing__row timing__row--reverse" data-aos="fade-up">
        <div class="timing__col timing__col--caption">
          <span class="timing__caption">Завершение вечера</span>
        </div>
        <div class="timing__col timing__col--time">
          <span class="timing__time">23:00</span>
        </div>
      </div>
    </div>
  </div>
</section>
